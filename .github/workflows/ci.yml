name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown formatting
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '{"default": true, "MD013": false, "MD033": false, "MD041": false}'

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in markdown
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          retry_wait_seconds: 30
          max_attempts: 3
          command: |
            npx --yes markdown-link-check@latest \
              --quiet \
              --config '{"aliveStatusCodes": [200, 301, 302, 403]}' \
              '**/*.md' \
              --ignore 'https://github.com/thaolst/ai-growth-prompts/blob/main/*'
